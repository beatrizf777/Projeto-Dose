<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D.O.S.E. - Início</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/assets/js/login.js" data-require="worker"></script>
</head>
<body class="bg-[#F0FFFD] text-[#364E72] font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-[#364E72] text-white shadow-md">
        <div class="max-w-5xl mx-auto px-6 py-5 flex items-center gap-3">
            <span class="flex items-center justify-center w-10 h-10 rounded-xl bg-[#74C2C9]">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 2a2 2 0 0 0-2 2v5H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h5v5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-5h5a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-5V4a2 2 0 0 0-2-2z"/>
                </svg>
            </span>
            <h1 class="text-2xl font-black tracking-[0.18em]">D.O.S.E</h1>
        </div>
    </header>

    <main class="max-w-5xl w-full mx-auto px-6 py-8 flex-grow flex flex-col gap-10">

        <!-- Gráficos -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Visão Geral</h2>
                <a href="/modulos/Igor/relatorios/relatorios.html"
                   class="inline-flex items-center gap-1 text-sm font-semibold text-[#5aaeb5] hover:text-[#364E72] transition">
                    Relatórios
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </a>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white rounded-2xl shadow-sm border border-[#7AB1C9]/30 p-5">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-[#364E72] mb-3">Mais Vendidos</h3>
                    <div class="relative h-64"><canvas id="topProductsChart"></canvas></div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-[#7AB1C9]/30 p-5">
                    <h3 class="text-sm font-bold uppercase tracking-wider text-[#364E72] mb-3">Valor Total por Categoria</h3>
                    <div class="relative h-64"><canvas id="valueByCategoryChart"></canvas></div>
                </div>
            </div>
        </section>

        <!-- Ações rápidas -->
        <section>
            <h2 class="text-lg font-semibold mb-4">Ações Rápidas</h2>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <a href="/modulos/Beatriz/cadastro/index.html"
                   class="group bg-white rounded-2xl shadow-sm border border-[#7AB1C9]/30 p-5 flex flex-col items-center gap-3 hover:shadow-md hover:border-[#74C2C9] transition">
                    <span class="flex items-center justify-center w-12 h-12 rounded-full bg-[#74C2C9]/15 text-[#364E72] group-hover:bg-[#74C2C9] group-hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    </span>
                    <span class="text-sm font-semibold">Entrada</span>
                </a>
                <a href="/modulos/Isadora/index.html"
                   class="group bg-white rounded-2xl shadow-sm border border-[#7AB1C9]/30 p-5 flex flex-col items-center gap-3 hover:shadow-md hover:border-[#74C2C9] transition">
                    <span class="flex items-center justify-center w-12 h-12 rounded-full bg-[#74C2C9]/15 text-[#364E72] group-hover:bg-[#74C2C9] group-hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </span>
                    <span class="text-sm font-semibold">Descarte</span>
                </a>
                <a href="/modulos/Samuel/Pedido.html"
                   class="group bg-white rounded-2xl shadow-sm border border-[#7AB1C9]/30 p-5 flex flex-col items-center gap-3 hover:shadow-md hover:border-[#74C2C9] transition">
                    <span class="flex items-center justify-center w-12 h-12 rounded-full bg-[#74C2C9]/15 text-[#364E72] group-hover:bg-[#74C2C9] group-hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    </span>
                    <span class="text-sm font-semibold">Pedidos</span>
                </a>
                <a href="/modulos/Maria Eduarda Madeira/consulta.html"
                   class="group bg-white rounded-2xl shadow-sm border border-[#7AB1C9]/30 p-5 flex flex-col items-center gap-3 hover:shadow-md hover:border-[#74C2C9] transition">
                    <span class="flex items-center justify-center w-12 h-12 rounded-full bg-[#74C2C9]/15 text-[#364E72] group-hover:bg-[#74C2C9] group-hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </span>
                    <span class="text-sm font-semibold">Consulta</span>
                </a>
            </div>
        </section>

        <!-- Painel de alertas -->
        <section>
            <h2 class="text-lg font-semibold mb-4">Painel de Alertas</h2>
            <div id="alertsPanel" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

    </main>

    <footer class="bg-white py-5 border-t border-[#7AB1C9]/30 text-center">
        <p class="text-xs text-[#7AB1C9] uppercase tracking-wider">D.O.S.E - <span id="rodapeData"></span></p>
    </footer>

    <script src="/assets/js/dashboard.js"></script>
    <script src="/assets/js/sidebar.js" data-role="funcionario"></script>
</body>
</html>
