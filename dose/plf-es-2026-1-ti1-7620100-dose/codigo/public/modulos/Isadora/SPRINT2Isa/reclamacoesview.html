<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.O.S.E - Reclamações</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/assets/js/login.js" data-require="worker" data-roles="Gerente"></script>
</head>

<body class="bg-[#F0FFFD] text-[#364E72] text-sm font-sans min-h-screen">

    <header class="bg-[#364E72] text-white px-6 py-4">
        <h1 class="text-[22px] font-bold">D.O.S.E</h1>
        <p class="text-[13px] mt-1 opacity-80">Visualizar reclamações</p>
    </header>

    <main class="max-w-[1100px] mx-auto p-5">
        <section class="bg-white border border-[#7AB1C9] rounded p-5">

        <div class="mb-4">
            <h1 class="text-base font-semibold mb-4 border-b-2 border-[#74C2C9] pb-1.5 text-[#364E72]">
                Banco de Reclamações
            </h1>
        </div>

        <div class="space-y-4 mb-6 bg-white border border-[#7AB1C9] rounded p-4">

            <div class="relative">
                <input type="text" id="searchBar" placeholder="Buscar por título ou descrição..."
                   class="w-full px-2.5 py-1.5 border border-[#7AB1C9] rounded text-[13px] text-[#364E72] bg-white focus:outline-none focus:border-[#74C2C9]">
            </div>

            <div class="flex flex-col sm:flex-row gap-2">
                <select id="sortField"
                    class="w-full flex-1 min-w-[150px] px-2 py-1.5 border border-[#7AB1C9] rounded text-[13px] text-[#364E72] bg-white focus:outline-none cursor-pointer"
                    <option value="id">Ordenar por: ID</option>
                    <option value="date">Ordenar por: Data</option>
                </select>
                <select id="sortOrder"
                    class="w-full flex-1 min-w-[150px] px-2 py-1.5 border border-[#7AB1C9] rounded text-[13px] text-[#364E72] bg-white focus:outline-none cursor-pointer"
                    <option value="asc">Mais Antigo / Crescente</option>
                    <option value="desc">Mais Recente / Decrescente</option>
                </select>
            </div>

            <div>
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Filtrar
                    Status:</span>
                <div class="flex flex-wrap gap-1.5 overflow-x-auto" id="statusFilterContainer">
                    <button data-type="status" data-value="PENDING"
                        class="border border-[#7AB1C9] bg-white text-[#364E72] text-[13px] px-3 py-1.5 rounded hover:bg-[#F0FFFD] transition-all font-medium cursor-pointer">Pendentes</button>
                    <button data-type="status" data-value="RESOLVED"
                        class="border border-[#7AB1C9] bg-white text-[#364E72] text-[13px] px-3 py-1.5 rounded hover:bg-[#F0FFFD] transition-all font-medium cursor-pointer">Resolvidos</button>
                    <button data-type="status" data-value="REJECTED"
                        class="border border-[#7AB1C9] bg-white text-[#364E72] text-[13px] px-3 py-1.5 rounded hover:bg-[#F0FFFD] transition-all font-medium cursor-pointer">Rejeitados</button>
                </div>
            </div>

            <div>
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Filtrar
                    Motivo:</span>
                <div class="flex flex-wrap gap-1.5" id="reasonFilterContainer">
                    <button data-type="reason" data-value="não recebido"
                        class="border border-[#7AB1C9] bg-white text-[#364E72] text-[13px] px-3 py-1.5 rounded hover:bg-[#F0FFFD] transition-all font-medium cursor-pointer">Não
                        Recebido</button>
                    <button data-type="reason" data-value="produto inconforme"
                        class="border border-[#7AB1C9] bg-white text-[#364E72] text-[13px] px-3 py-1.5 rounded hover:bg-[#F0FFFD] transition-all font-medium cursor-pointer">Inconforme</button>
                    <button data-type="reason" data-value="danificado"
                        class="border border-[#7AB1C9] bg-white text-[#364E72] text-[13px] px-3 py-1.5 rounded hover:bg-[#F0FFFD] transition-all font-medium cursor-pointer">Danificado</button>
                    <button data-type="reason" data-value="atraso"
                        class="border border-[#7AB1C9] bg-white text-[#364E72] text-[13px] px-3 py-1.5 rounded hover:bg-[#F0FFFD] transition-all font-medium cursor-pointer">Atraso</button>
                    <button data-type="reason" data-value="falta documentação"
                        class="border border-[#7AB1C9] bg-white text-[#364E72] text-[13px] px-3 py-1.5 rounded hover:bg-[#F0FFFD] transition-all font-medium cursor-pointer">Falta
                        Doc.</button>
                </div>
            </div>

        </div>

       <div class="mb-4 text-[13px] font-semibold text-[#364E72] uppercase tracking-wide">
            Reclamações encontradas: <span id="totalComplaints" class="text-sm text-gray-800 font-black ml-1">0</span>
        </div>

        <div id="complaintsList" class="space-y-2 max-h-80 overflow-y-auto pr-1"></div>

        <div id="detailsCard" class="hidden mt-6 border border-[#7AB1C9] rounded p-5 bg-white relative">

            <button id="closeDetailsBtn"
               class="absolute top-3 right-4 text-[#364E72]/60 hover:text-[#364E72] font-bold text-sm cursor-pointer">
                ✕
            </button>

            <h3 id="detailTitle" class="text-base font-semibold mb-3 border-b-2 border-[#74C2C9] pb-1.5 text-[#364E72]">-</h3>

            <div class="mb-4">
                <span class="text-[11px] font-bold text-gray-400 block uppercase tracking-wide mb-0.5">descrição:</span>
                <p id="detailDescription" class="text-xs text-gray-600 leading-relaxed">-</p>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 items-start">
                <div class="flex-1 text-xs space-y-1.5 text-gray-700 break-words">
                    <p><strong>Produto:</strong> <span id="detailProductName" class="text-gray-900 font-medium">-</span>
                    </p>
                    <p><strong>Lote:</strong> <span id="detailBatch" class="text-gray-900">-</span></p>
                    <p><strong>Qtd. Afetada:</strong> <span id="detailQuantity" class="text-gray-900">-</span></p>
                    <p><strong>Cód. Usuário:</strong> <span id="detailUser" class="text-gray-900">-</span></p>
                    <p><strong>Data da reclamação:</strong> <span id="detailDate" class="text-gray-900">-</span></p>
                    <p><strong>Status:</strong> <span id="detailStatus"
                            class="font-bold px-1.5 py-0.5 rounded text-[10px]">-</span></p>
                    <p><strong>Motivo_chave:</strong> <span id="detailKeyReason" class="text-gray-900">-</span></p>
                </div>

                <div
                    class="w-20 h-20 sm:w-24 sm:h-24 border border-[#7AB1C9] rounded flex items-center justify-center overflow-hidden bg-[#F0FFFD]/30 flex-shrink-0 mx-auto sm:mx-0">
                    <img id="detailProductImage" src="" alt="Produto" class="object-cover w-full h-full hidden">
                    <span id="imgPlaceholder" class="text-[10px] text-gray-400 text-center p-1">Sem imagem</span>
                </div>
            </div>

        </div>

        </section>
    </main>

    <script src="reclamacoesview.js"></script>
    <script src="/assets/js/sidebar.js" data-role="funcionario"></script>
</body>

</html>
