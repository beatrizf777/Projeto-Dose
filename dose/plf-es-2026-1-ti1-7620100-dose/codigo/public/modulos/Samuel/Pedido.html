<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>D.O.S.E. - Painel de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/assets/js/login.js" data-require="worker" data-roles="Estoquista,Gerente"></script>
</head>
<body class="bg-[#F0FFFD] text-[#364E72] font-sans antialiased">

    <header class="w-full flex items-center justify-between p-6 bg-[#364E72] text-white shadow-md">
        <div>
            <h1 class="text-xl font-semibold tracking-wide">Sistema de Pedidos</h1>
            <p class="text-sm text-white/70">Painel Administrativo da Farmácia</p>
        </div>
        <h1 class="text-2xl font-bold tracking-wider">D.O.S.E</h1>
    </header>

    <div class="flex flex-col md:flex-row gap-6 p-6">

        <div class="flex-1 space-y-6">

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-[#7AB1C9]/30">
                <h3 class="text-lg font-semibold mb-4 text-[#364E72]">Nova Solicitação de Compra</h3>

                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-1 text-[#364E72]">Produto:</label>
                    <select id="pedProduto" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]"></select>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-1 text-[#364E72]">Marca:</label>
                    <select id="pedMarca" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]"></select>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-1 text-[#364E72]">Quantidade:</label>
                    <input type="number" id="pedQtd" placeholder="Ex: 50" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-1 text-[#364E72]">Fornecedor:</label>
                    <select id="pedFornecedor" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]"></select>
                </div>

                <button onclick="fazerPedido()" class="bg-[#74C2C9] hover:bg-[#5aaeb5] text-white font-semibold py-2 px-4 rounded-xl shadow-md transition w-full">
                    Enviar Pedido
                </button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-[#7AB1C9]/30">
                <h3 class="text-lg font-semibold mb-4 text-[#364E72]">Registrar Avaria / Reclamação</h3>

                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-1 text-[#364E72]">Título:</label>
                    <input id="recTitulo" type="text" placeholder="Resumo da ocorrência..." class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-1 text-[#364E72]">Selecionar Lote:</label>
                    <select id="recLote" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]">
                        <option value="">Carregando lotes...</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-1 text-[#364E72]">Fornecedor do Lote:</label>
                    <select id="recFornecedor" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]"></select>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-[#364E72]">Motivo:</label>
                        <select id="recMotivo" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]">
                            <option value="danificado">Danificado</option>
                            <option value="produto inconforme">Produto inconforme</option>
                            <option value="não recebido">Não recebido</option>
                            <option value="atraso">Atraso</option>
                            <option value="falta documentação">Falta documentação</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold mb-1 text-[#364E72]">Qtd. afetada:</label>
                        <input id="recQtd" type="number" min="1" placeholder="0" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold mb-1 text-[#364E72]">Descrição do Problema:</label>
                    <textarea id="recTexto" rows="3" placeholder="Digite o motivo da avaria..." class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9] resize-none"></textarea>
                </div>

                <button onclick="fazerReclamacao()" class="bg-[#364E72] hover:bg-[#2c3f5e] text-white font-semibold py-2 px-4 rounded-xl shadow-md transition w-full">
                    Registrar Ocorrência
                </button>
            </div>

        </div>

        <div class="w-full md:w-5/12 bg-white p-6 rounded-2xl shadow-sm border border-[#7AB1C9]/30 h-fit">
            <h3 class="text-lg font-semibold mb-4 text-[#364E72]">Monitoramento de Pedidos</h3>

            <div class="mb-6">
                <label class="block text-xs font-semibold mb-1 text-[#364E72]">Selecione um Pedido Ativo:</label>
                <select id="selectPedidosAtivos" class="w-full p-2 border border-[#7AB1C9] rounded-xl bg-white text-[#364E72] focus:outline-none focus:border-[#74C2C9]">
                    <option value="">Selecione um pedido para rastrear...</option>
                </select>
            </div>

            <hr class="border-[#7AB1C9]/30 mb-6">

            <div id="timelineStatus">
                <p class="text-center text-[#7AB1C9] text-xs italic py-6">Aguardando seleção de pedido...</p>
            </div>
        </div>

    </div>

    <script src="Pedido.js"></script>
    <script src="/assets/js/sidebar.js" data-role="funcionario"></script>
</body>
</html>
