<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.O.S.E. - Consulta de Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#F0FFFD] text-[#364E72] font-sans antialiased min-h-screen flex flex-col justify-between">

    <header class="bg-[#364E72] text-white shadow-md py-5 text-center">
        <h1 class="text-xl font-bold tracking-widest uppercase">Consulta</h1>
    </header>

    <main class="max-w-4xl w-full mx-auto p-4 flex-grow">
        
        <div class="relative mb-8">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-[#7AB1C9]">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input
                type="text"
                id="search-input"
                placeholder="BUSCAR PRODUTO..."
                class="w-full pl-10 pr-10 py-3 border border-[#7AB1C9] rounded-full focus:outline-none focus:ring-2 focus:ring-[#74C2C9] focus:border-transparent uppercase text-sm tracking-wider shadow-sm text-[#364E72]"
            >
            <button id="clear-search" class="absolute inset-y-0 right-0 flex items-center pr-4 text-[#7AB1C9] hover:text-[#364E72] hidden">
                <i class="fa-solid fa-circle-xmark"></i>
            </button>
        </div>

        <div id="catalog-container" class="space-y-8">
            <div class="flex justify-center items-center py-12">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#74C2C9]"></div>
            </div>
        </div>

    </main>

    <footer class="bg-white py-6 border-t border-[#7AB1C9]/30 text-center">
        <h2 class="text-3xl font-black tracking-[0.25em] text-[#364E72]">D.O.S.E.</h2>
        <p class="text-xs text-[#7AB1C9] mt-1 uppercase tracking-wider">Dashboard de Operação e Sistema de Estoque</p>
    </footer>

    <script src="produtos.js"></script>
    <script src="/assets/js/sidebar.js" data-role="cliente"></script>
</body>
</html>
